name: Contributor Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  issues:
    types:
      - closed
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: contributor-leaderboard
  cancel-in-progress: false

env:
  LEADERBOARD_API_URL: https://codevibe-3.onrender.com/api/contributors/sync

jobs:
  update-leaderboard:
    name: Update contributor leaderboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate leaderboard
        uses: actions/github-script@v7
        env:
          LEADERBOARD_API_TOKEN: ${{ secrets.LEADERBOARD_API_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { updateContributorLeaderboard } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/update-contributor-leaderboard.cjs`);

            await updateContributorLeaderboard({
              github,
              context,
              core,
              outputPath: "CONTRIBUTOR_LEADERBOARD.md"
            });

      - name: Commit leaderboard changes
        run: |
          if git diff --quiet -- CONTRIBUTOR_LEADERBOARD.md; then
            echo "Contributor leaderboard is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTOR_LEADERBOARD.md
          git commit -m "docs: update contributor leaderboard"
          git push
